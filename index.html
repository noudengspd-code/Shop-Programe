  const e=inc||{category:state.incomeCats[0].id,note:'',amount:0,method:'cash'};
  const catOpts=state.incomeCats.map(c=>`<option value="${c.id}" ${e.category===c.id?'selected':''}>${c.emoji} ${esc(c.name)}</option>`).join('');
  const html=`<div class="modal-back" onclick="if(event.target===this)closeModal()"><div class="modal">
    <div class="modal-grip"></div><h3>ບັນທຶກລາຍຮັບ</h3><p class="msub">ລາຍຮັບອື່ນ ນອກຈາກການຂາຍໜ້າຮ້ານ</p>
    <div class="fg full" style="margin-bottom:14px"><label>ວັນເດືອນປີ</label><input type="date" id="incDate" value="${dateInputVal(inc?inc.date:null)}"></div>
    <div class="fg full" style="margin-bottom:14px"><label>ປະເພດລາຍຮັບ</label>
      <div style="display:flex;gap:8px"><select id="incCat" style="flex:1">${catOpts}</select>
      <button class="lu-btn" style="padding:0 16px;white-space:nowrap" onclick="addIncomeCat()">＋ ໃໝ່</button></div>
    </div>
    <div class="fg full" style="margin-bottom:14px"><label>ລາຍລະອຽດ</label><input type="text" id="incNote" value="${esc(e.note)}" placeholder="ເຊັ່ນ ຂາຍສົ່ງ, ເງິນຄືນ"></div>
    <div class="fg full" style="margin-bottom:10px"><label>ຈຳນວນເງິນ</label><div class="unit-in"><input type="number" id="incAmount" value="${e.amount}" inputmode="numeric" oninput="updateIncView()"><span class="u">ກີບ</span></div></div>
    <div class="opt-row" style="margin-bottom:14px">
      <button type="button" class="opt-btn" onclick="bumpIncAmount(1000)">+1,000</button>
      <button type="button" class="opt-btn" onclick="bumpIncAmount(10000)">+10,000</button>
      <button type="button" class="opt-btn" onclick="bumpIncAmount(50000)">+50,000</button>
      <button type="button" class="opt-btn" onclick="bumpIncAmount(0)">ລ້າງ</button>
    </div>
    <div class="fg full" style="margin-bottom:6px"><label>ຮັບຜ່ານ</label>
      <div class="opt-row" id="incMethodRow">
        <button type="button" class="opt-btn ${e.method==='cash'?'on':''}" data-m="cash" onclick="setIncMethod('cash')">💵 ເງິນສົດ</button>
        <button type="button" class="opt-btn ${e.method==='transfer'?'on':''}" data-m="transfer" onclick="setIncMethod('transfer')">🏦 ເງິນໂອນ</button>
      </div>
    </div>
    <input type="hidden" id="incMethod" value="${e.method}">
    <div class="suggested-price" style="margin-top:14px"><span class="sp-l">ລວມ</span><span class="sp-v" id="incView">${kip(e.amount)}</span></div>
    <button class="btn-save" onclick="saveIncome('${inc?inc.id:''}')"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>ບັນທຶກ</button>
    ${inc?`<button class="btn-ghost" style="color:var(--danger-deep)" onclick="deleteIncome('${inc.id}')">🗑️ ລຶບລາຍການນີ້</button>`:''}
    <button class="btn-ghost" onclick="closeModal()">ຍົກເລີກ</button>
  </div></div>`;
  $('modalRoot').innerHTML=html;
}
function setIncMethod(m){ $('incMethod').value=m; document.querySelectorAll('#incMethodRow .opt-btn').forEach(b=>b.classList.toggle('on',b.dataset.m===m)); }
function bumpIncAmount(step){ const el=$('incAmount'); if(!el)return; el.value=step===0?0:(parseFloat(el.value)||0)+step; updateIncView(); }
function updateIncView(){ const v=$('incView'); if(v)v.textContent=kip(parseFloat($('incAmount').value)||0); }
function saveIncome(id){
  const amount=parseFloat($('incAmount').value)||0;
  if(amount<=0){ toast('ໃສ່ຈຳນວນເງິນ',true); return; }
  const dateISO=$('incDate').value?new Date($('incDate').value+'T12:00:00').toISOString():new Date().toISOString();
  const data={date:dateISO,category:$('incCat').value,note:$('incNote').value.trim(),amount,method:$('incMethod').value};
  if(id){ Object.assign(state.incomes.find(i=>i.id===id),data); toast('ແກ້ໄຂແລ້ວ'); }
  else{ state.incomes.push({id:'inc'+Date.now(),...data}); toast('ບັນທຶກລາຍຮັບແລ້ວ'); }
  save(); closeModal(); refresh();
}
function deleteIncome(id){ state.incomes=state.incomes.filter(i=>i.id!==id); save(); closeModal(); refresh(); toast('ລຶບລາຍຮັບແລ້ວ'); }

/* ============================================================
   PAGE: STATS (ລະອຽດ — ຕາຕະລາງແຕ່ລະເຄື່ອງດື່ມ)
   ============================================================ */
let statPeriod='month';
function renderStats(){
  const now=new Date();
  let orders, periodLabel;
  if(statPeriod==='day'){ orders=state.orders.filter(o=>todayKey(new Date(o.time))===todayKey(now)); periodLabel='ມື້ນີ້'; }
  else if(statPeriod==='week'){ orders=state.orders.filter(o=>sameWeek(new Date(o.time),now)); periodLabel='ອາທິດນີ້'; }
  else{ orders=state.orders.filter(o=>inMonth(o.time,state.viewYear,state.viewMonth)); periodLabel=LAO_MONTHS[state.viewMonth]+' '+state.viewYear; }

  const rev=orders.reduce((s,o)=>s+o.total,0);
  const cost=orders.reduce((s,o)=>s+o.cost,0);
  const profit=rev-cost;
  const count=orders.length;
  const cups=orders.reduce((s,o)=>s+o.items.reduce((a,i)=>a+i.qty,0),0);

  // ຕໍ່ເຄື່ອງດື່ມ: qty, revenue, cost, profit
  const per={};
  orders.forEach(o=>o.items.forEach(i=>{
    if(!per[i.id])per[i.id]={name:i.name,emoji:i.emoji,qty:0,rev:0,cost:0};
    per[i.id].qty+=i.qty; per[i.id].rev+=i.price*i.qty; per[i.id].cost+=(i.cost||0)*i.qty;
  }));
  const rows=Object.values(per).sort((a,b)=>b.qty-a.qty);
  const maxQty=rows.length?rows[0].qty:1;

  // ຕາຕະລາງລະອຽດ
  let tableHtml;
  if(rows.length===0){
    tableHtml=`<div class="empty-state" style="padding:30px 20px"><span class="es-em">📊</span><div class="es-t">ຍັງບໍ່ມີການຂາຍ</div><div class="es-s">ຂາຍເຄື່ອງດື່ມແລ້ວຕາຕະລາງຈະສະແດງທີ່ນີ້</div></div>`;
  }else{
    const trs=rows.map(r=>{
      const pr=r.rev-r.cost;
      return `<tr>
        <td>${r.emoji} ${esc(r.name)}</td>
        <td>${fmt(r.qty)}</td>
        <td>${fmt(r.rev)}</td>
        <td>${fmt(r.cost)}</td>
        <td class="pos">${fmt(pr)}</td>
      </tr>`;
    }).join('');
    tableHtml=`<div class="tbl-wrap"><table class="data">
      <thead><tr><th>ເຄື່ອງດື່ມ</th><th>ຈຳນວນ</th><th>ຍອດຂາຍ</th><th>ຕົ້ນທຶນ</th><th>ກຳໄລ</th></tr></thead>
      <tbody>${trs}</tbody>
      <tfoot><tr><td>ລວມ</td><td>${fmt(cups)}</td><td>${fmt(rev)}</td><td>${fmt(cost)}</td><td>${fmt(profit)}</td></tr></tfoot>
    </table></div>
    <div class="tbl-scroll-hint">← ເລື່ອນຊ້າຍ-ຂວາເພື່ອເບິ່ງທຸກຖັນ →</div>`;
  }

  // ກຣາຟຂາຍດີ
  let barsHtml;
  if(rows.length===0){ barsHtml=''; }
  else{
    barsHtml=`<div class="card"><div class="card-title"><span class="dot"></span>ອັນດັບຂາຍດີ</div>`+
    rows.map((r,idx)=>{
      const pct=Math.round(r.qty/maxQty*100);
      const rClass=idx===0?'r1':idx===1?'r2':'r3';
      const medal=idx===0?'🥇':idx===1?'🥈':idx===2?'🥉':'';
      return `<div class="bar-item"><div class="bar-top"><span class="bar-nm"><span class="em">${r.emoji}</span>${esc(r.name)} ${medal}</span><span class="bar-val">${r.qty} ຈອກ</span></div><div class="bar-track"><div class="bar-fill ${rClass}" style="width:${pct}%"></div></div><div class="bar-sub">ຍອດ ${kip(r.rev)} · ກຳໄລ ${kip(r.rev-r.cost)}</div></div>`;
    }).join('')+`</div>`;
  }

  const showMonthNav = statPeriod==='month';

  return `<div class="page">
    <div class="sec-head"><h2>ສະຖິຕິ</h2><p>ລາຍລະອຽດການຂາຍ ແລະ ກຳໄລ</p></div>
    <div class="seg">
      <button class="${statPeriod==='day'?'on':''}" onclick="setStatPeriod('day')">ມື້</button>
      <button class="${statPeriod==='week'?'on':''}" onclick="setStatPeriod('week')">ອາທິດ</button>
      <button class="${statPeriod==='month'?'on':''}" onclick="setStatPeriod('month')">ເດືອນ</button>
    </div>
    ${showMonthNav?monthNav():''}
    <div class="stat-grid">
      <div class="stat mint"><div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="#0E5551" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div><div class="lbl">ຍອດຂາຍ ${periodLabel}</div><div class="val">${fmt(rev)} <small>ກີບ</small></div></div>
      <div class="stat lav"><div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="#5B4B9A" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg></div><div class="lbl">ກຳໄລ</div><div class="val">${fmt(profit)} <small>ກີບ</small></div></div>
      <div class="stat peach"><div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="#B5651D" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg></div><div class="lbl">ຕົ້ນທຶນ</div><div class="val">${fmt(cost)} <small>ກີບ</small></div></div>
      <div class="stat sky"><div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="#2C6E8F" stroke-width="2"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/></svg></div><div class="lbl">ຂາຍໄດ້ (ຈອກ)</div><div class="val">${fmt(cups)}</div></div>
    </div>
    <div class="card">
      <div class="card-title"><span class="dot"></span>ຕາຕະລາງແຕ່ລະເຄື່ອງດື່ມ (${periodLabel})</div>
      ${tableHtml}
    </div>
    ${barsHtml}
  </div>`;
}
function setStatPeriod(p){ statPeriod=p; refresh(); }

/* month nav (shared) */
function monthNav(){
  return `<div class="month-nav">
    <button onclick="shiftMonth(-1)"><svg viewBox="0 0 24 24" fill="none" stroke="#0B2E33" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
    <div class="mlabel">${LAO_MONTHS[state.viewMonth]}<small>${state.viewYear}</small></div>
    <button onclick="shiftMonth(1)"><svg viewBox="0 0 24 24" fill="none" stroke="#0B2E33" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></button>
  </div>`;
}
function shiftMonth(d){
  state.viewMonth+=d;
  if(state.viewMonth>11){state.viewMonth=0;state.viewYear++;}
  if(state.viewMonth<0){state.viewMonth=11;state.viewYear--;}
  refresh();
}

/* ============================================================
   PAGE: STOCK (ຫົວໜ່ວຍ + ປະລິມານ ລະອຽດ)
   ============================================================ */
function renderStock(){
  const low=state.ingredients.filter(i=>i.stock<=i.lowAt);
  let alertHtml='';
  if(low.length>0){
    alertHtml=`<div class="alert-banner"><div class="ab-ico">⚠️</div><div class="ab-txt"><div class="ab-t">ກະຕ໋ອກໃກ້ຈະໝົດ!</div><div class="ab-s">${low.map(i=>i.emoji+esc(i.name)).join(', ')} ຄວນເຕີມ</div></div></div>`;
  }
  const rows=state.ingredients.map(i=>{
    const totalBase=i.stock+(i.used||0);            // ຈຳນວນປະລິມານທັງໝົດ (ເຄີຍມີ)
    const ratio=i.stock/(i.lowAt*3||1);
    const pct=Math.min(100,Math.round(ratio*100));
    let badge,fill;
    if(i.stock<=0){badge='<span class="stock-badge out">ໝົດແລ້ວ</span>';fill='var(--danger)';}
    else if(i.stock<=i.lowAt){badge='<span class="stock-badge low">ໃກ້ໝົດ</span>';fill='var(--warn)';}
    else{badge='<span class="stock-badge ok">ພຽງພໍ</span>';fill='var(--teal)';}
    const cpb=costPerBase(i);
    const containersLeft=i.qtyPerUnit>0?(i.stock/i.qtyPerUnit):0;
    return `<div class="stock-row">
      <div class="stock-top">
        <div class="stock-emoji">${i.emoji}</div>
        <div class="stock-info">
          <div class="stock-nm">${esc(i.name)}</div>
          <div class="stock-qty">ຫົວໜ່ວຍ: ${esc(i.unit)} · ${fmt(i.qtyPerUnit)} ${esc(i.baseUnit)}/${esc(i.unit)} · ${fmt(i.purchaseCost)} ກີບ</div>
          <div class="cost-per-base">ຕົ້ນທຶນ ${cpb.toFixed(1)} ກີບ/${esc(i.baseUnit)}</div>
        </div>
        ${badge}
      </div>
      <div class="stock-grid">
        <div class="sg-cell"><div class="sg-l">ທັງໝົດ</div><div class="sg-v">${fmt(totalBase)} <small>${esc(i.baseUnit)}</small></div></div>
        <div class="sg-cell"><div class="sg-l">ໃຊ້ແລ້ວ</div><div class="sg-v used">${fmt(i.used||0)} <small>${esc(i.baseUnit)}</small></div></div>
        <div class="sg-cell"><div class="sg-l">ຍັງເຫຼືອ</div><div class="sg-v left">${fmt(i.stock)} <small>${esc(i.baseUnit)}</small></div></div>
      </div>
      <div class="stock-bar"><div class="stock-fill" style="width:${pct}%;background:${fill}"></div></div>
      <div class="stock-sub">≈ ${containersLeft.toFixed(1)} ${esc(i.unit)} ຄົງເຫຼືອ</div>
      <div class="stock-actions">
        <button class="sa-add" onclick="stockChange('${i.id}','add')">＋ ເຕີມ</button>
        <button class="sa-use" onclick="stockChange('${i.id}','use')">－ ຫັກ</button>
        <button class="sa-use" onclick="editIngredient('${i.id}')">✏️ ແກ້ໄຂ</button>
      </div>
    </div>`;
  }).join('');
  return `<div class="page">
    <div class="sec-head"><h2>ສາງ / ວັດຖຸດິບ</h2><p>ຈັດການສະຕ໋ອກ ຫົວໜ່ວຍ ແລະ ຕົ້ນທຶນ</p></div>
    ${alertHtml}
    <button class="add-btn-row" onclick="addIngredient()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>ເພີ່ມວັດຖຸດິບ</button>
    ${rows}

function stockChange(id,mode){
  const ing=findIng(id); if(!ing)return;
  const title=mode==='add'?'ເຕີມສະຕ໋ອກ':'ຫັກສະຕ໋ອກ';
  const perUnit=ing.qtyPerUnit;
  const html=`<div class="modal-back" onclick="if(event.target===this)closeModal()"><div class="modal">
    <div class="modal-grip"></div><h3>${title}</h3>
    <p class="msub">${ing.emoji} ${esc(ing.name)} · ເຫຼືອ ${fmt(ing.stock)} ${esc(ing.baseUnit)}</p>
    ${mode==='add'?`<div class="fg full" style="margin-bottom:14px"><label>ເຕີມເປັນ ${esc(ing.unit)} (1 ${esc(ing.unit)} = ${fmt(perUnit)} ${esc(ing.baseUnit)})</label>
      <div class="opt-row" style="margin-top:4px">
        <button class="opt-btn" onclick="setStockByUnit('${id}',1)">1 ${esc(ing.unit)}</button>
        <button class="opt-btn" onclick="setStockByUnit('${id}',5)">5 ${esc(ing.unit)}</button>
        <button class="opt-btn" onclick="setStockByUnit('${id}',10)">10 ${esc(ing.unit)}</button>
      </div></div>`:''}
    <div class="fg full"><label>${mode==='add'?'ຫຼື ໃສ່ຈຳນວນ':'ຈຳນວນທີ່ຫັກ'} (${esc(ing.baseUnit)})</label><input type="number" id="stockAmt" value="${mode==='add'?perUnit:0}" min="0" inputmode="numeric"></div>

function setStockByUnit(id,units){
  const ing=findIng(id); if(!ing)return;
  const el=$('stockAmt'); if(el)el.value=units*ing.qtyPerUnit;
}
function applyStock(id,mode){
  const ing=findIng(id);
  const amt=parseFloat($('stockAmt').value)||0;
  if(amt<=0){ toast('ກະລຸນາໃສ່ຈຳນວນ',true); return; }
  if(mode==='add'){ ing.stock+=amt; }
  else { const take=Math.min(amt,ing.stock); ing.stock=Math.max(0,ing.stock-amt); ing.used=(ing.used||0)+take; }
  save(); closeModal(); refresh();
  toast((mode==='add'?'ເຕີມ ':'ຫັກ ')+fmt(amt)+' '+ing.baseUnit+' ສຳເລັດ');
}

function updateIngCalc(){
  const cost=parseFloat($('ingPCost').value)||0;
  const qty=parseFloat($('ingQtyPer').value)||0;
  const bu=$('ingBUnit').value;
  const containers=parseFloat($('ingContainers').value)||0;
  const cpb=qty>0?cost/qty:0;
  // sync unit labels
  const qu=$('ingQtyUnit'); if(qu)qu.textContent=bu;
  const lu=$('ingLowUnit'); if(lu)lu.textContent=bu;
  const p=$('ingCalcPrev');
  if(p)p.innerHTML=`<div class="cp-row big" style="border:none;margin:0;padding:0"><span class="cp-l">ຕົ້ນທຶນຕໍ່ ${esc(bu)}</span><span class="cp-v pos-margin">${cpb.toFixed(2)} ກີບ/${esc(bu)}</span></div>`;
  const tp=$('ingTotalPrev');
  if(tp){
    const totalBase=containers*qty;
    const totalVal=containers*cost;
    tp.innerHTML=`<div class="cp-row"><span class="cp-l">ປະລິມານທັງໝົດ</span><span class="cp-v">${fmt(totalBase)} ${esc(bu)}</span></div>
    <div class="cp-row"><span class="cp-l">ມູນຄ່າສາງ</span><span class="cp-v pos-margin">${kip(totalVal)}</span></div>`;
  }
}
function pickEmoji(btn,hiddenId,em){
  btn.parentElement.querySelectorAll('.emoji-opt').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on'); $(hiddenId).value=em;
}
function saveIngredient(id){
  const name=$('ingName').value.trim();
  if(!name){ toast('ກະລຸນາປ້ອນຊື່',true); return; }
  const qtyPer=parseFloat($('ingQtyPer').value)||0;
  if(qtyPer<=0){ toast('ໃສ່ປະລິມານຕໍ່ຕຸກ/ຖົງ',true); return; }
  const containers=parseFloat($('ingContainers').value)||0;
  const totalBase=containers*qtyPer;
  const existing=id?findIng(id):null;
  const used=existing?(existing.used||0):0;
  // ຍັງເຫຼືອ = ທັງໝົດ − ໃຊ້ແລ້ວ (ບໍ່ຕິດລົບ)
  const stock=Math.max(0, totalBase-used);
  const data={
    name, emoji:$('ingEmoji').value, category:$('ingCat').value,
    unit:$('ingUnit').value.trim()||'ໜ່ວຍ', qtyPerUnit:qtyPer,
    baseUnit:$('ingBUnit').value, purchaseCost:parseFloat($('ingPCost').value)||0,
    stock, used, lowAt:parseFloat($('ingLow').value)||0,
  };
  if(id){ Object.assign(findIng(id),data); toast('ບັນທຶກແລ້ວ'); }
  else{ state.ingredients.push({id:'ing'+Date.now(),...data}); toast('ເພີ່ມວັດຖຸດິບແລ້ວ'); }
  save(); closeModal(); refresh();
}
function deleteIngredient(id){
  // ເຊັກວ່າມີເມນູໃຊ້ຢູ່ບໍ່
  const used=state.menu.filter(m=>(m.recipe||[]).some(r=>r.ingredientId===id));
  if(used.length>0){
    toast('ວັດຖຸດິບນີ້ຖືກໃຊ້ໃນ '+used.length+' ເມນູ ລຶບບໍ່ໄດ້',true);
    return;
  }
  state.ingredients=state.ingredients.filter(i=>i.id!==id);
  save(); closeModal(); refresh(); toast('ລຶບແລ້ວ');
}

let _catCtx=null; // {type, selectId} — ບອກວ່າກຳລັງເພີ່ມ cat ໃຫ້ບ່ອນໃດ
function addIngCat(){ openCatModal('ing'); }
function addMenuCat(){ openCatModal('menu'); }
function addExpenseCat(){ openCatModal('expense'); }
function addIncomeCat(){ openCatModal('income'); }

function catStore(type){
  return type==='ing'?state.ingCats:type==='menu'?state.menuCats:type==='expense'?state.expenseCats:state.incomeCats;
}
function catSelectId(type){
  return type==='ing'?'ingCat':type==='menu'?'menuCat':type==='expense'?'expCat':'incCat';
}
function openCatModal(type){
  _catCtx={type};
  const emojiPool = type==='ing'?ING_EMOJIS:EMOJI_SET;
  const emojiBtns=emojiPool.slice(0,24).map((em,i)=>`<button class="emoji-opt ${i===0?'on':''}" onclick="pickCatEmoji(this,'${em}')">${em}</button>`).join('');
  // ລາຍການປະເພດປັດຈຸບັນ ພ້ອມປຸ່ມລຶບ
  const existing=catStore(type).map(c=>`<div class="saved-name-chip" style="cursor:default">${c.emoji} ${esc(c.name)} <span onclick="deleteCat('${type}','${c.id}')" style="margin-left:4px;color:var(--danger-deep);font-weight:800;cursor:pointer">✕</span></div>`).join('');
  const html=`<div class="modal-back" style="z-index:250" onclick="if(event.target===this)closeCatModal()"><div class="modal">
    <div class="modal-grip"></div><h3>ຈັດການປະເພດ</h3><p class="msub">ເພີ່ມ ຫຼື ລຶບ ໝວດໝູ່ ບໍ່ຈຳກັດ</p>
    <div class="fg full" style="margin-bottom:16px"><label>ປະເພດປັດຈຸບັນ (ກົດ ✕ ເພື່ອລຶບ)</label><div class="saved-names">${existing}</div></div>
    <div class="divider-lbl" style="margin:6px 0 12px">ເພີ່ມປະເພດໃໝ່</div>
    <input type="hidden" id="catEmoji" value="${emojiPool[0]}">
    <div class="fg full" style="margin-bottom:14px"><label>ໄອຄອນ</label><div class="emoji-pick" style="max-height:130px;overflow-y:auto">${emojiBtns}</div></div>
    <div class="fg full"><label>ຊື່ປະເພດ</label><input type="text" id="catName" placeholder="ເຊັ່ນ ນ້ຳປັ່ນ"></div>
    <button class="btn-save" onclick="saveNewCat()">ບັນທຶກປະເພດໃໝ່</button>
    <button class="btn-ghost" onclick="closeCatModal()">ປິດ</button>
  </div></div>`;
  const wrap=document.createElement('div'); wrap.id='catModalRoot'; wrap.innerHTML=html;
  document.body.appendChild(wrap);
}
function catInUse(type,id){
  if(type==='menu') return state.menu.some(m=>(m.category||'drink')===id);
  if(type==='ing') return state.ingredients.some(i=>i.category===id);
  if(type==='expense') return state.expenses.some(e=>e.category===id);
  if(type==='income') return state.incomes.some(i=>i.category===id);
  return false;
}
function deleteCat(type,id){
  const store=catStore(type);
  if(store.length<=1){ toast('ຕ້ອງມີຢ່າງໜ້ອຍ 1 ປະເພດ',true); return; }
  if(catInUse(type,id)){ toast('ປະເພດນີ້ຖືກໃຊ້ຢູ່ ລຶບບໍ່ໄດ້',true); return; }
  const idx=store.findIndex(c=>c.id===id);
  if(idx>=0){ store.splice(idx,1); save(); }
  closeCatModal(); openCatModal(type); // reopen to refresh list
  toast('ລຶບປະເພດແລ້ວ');
}
function pickCatEmoji(btn,em){
  btn.parentElement.querySelectorAll('.emoji-opt').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on'); $('catEmoji').value=em;
}
function closeCatModal(){ const w=$('catModalRoot'); if(w)w.remove(); _catCtx=null; }
function saveNewCat(){
  const name=$('catName').value.trim();
  if(!name){ toast('ໃສ່ຊື່ປະເພດ',true); return; }
  const emoji=$('catEmoji').value;
  const type=_catCtx.type;
  const store=catStore(type);
  const id='c'+Date.now();
  store.push({id,name,emoji});
  save();
  // add the new option to the underlying select and select it
  const sel=$(catSelectId(type));
  if(sel){
    const opt=document.createElement('option');
    opt.value=id; opt.textContent=emoji+' '+name; opt.selected=true;
    sel.appendChild(opt);
  }
  closeCatModal();
  toast('ເພີ່ມປະເພດ "'+name+'" ແລ້ວ');
}

    <div id="syncSection" class="divider-lbl">🔄 ຊິ້ງຫຼາຍເຄື່ອງ & ສຳຮອງຂໍ້ມູນ</div>

/* ---- ຈັດການລາຍການສ່ວນຫຼຸດ ---- */
function renderDiscountPresetList(){
  if(!state.discountPresets.length) return `<div class="tiny-note" style="padding:8px 0">ຍັງບໍ່ມີລາຍການສ່ວນຫຼຸດ</div>`;
  return state.discountPresets.map(p=>{
    const lbl=p.type==='pct'?(p.value+'%'):(fmt(p.value)+' ກີບ');
    return `<div class="list-item">
      <div class="li-ico" style="background:var(--pastel-peach)">🏷️</div>
      <div class="li-body"><div class="li-t">${esc(p.name)}</div><div class="li-s">ຫຼຸດ ${lbl}</div></div>
      <button class="del-x" onclick="deleteDiscountPreset('${p.id}')">🗑</button>
    </div>`;
  }).join('');
}
function addDiscountPreset(){
  const html=`<div class="modal-back" onclick="if(event.target===this)closeModal()"><div class="modal">
    <div class="modal-grip"></div><h3>ເພີ່ມລາຍການສ່ວນຫຼຸດ</h3><p class="msub">ຕັ້ງໄວ້ໃຫ້ເລືອກໄວຕອນຂາຍ</p>
    <div class="fg full" style="margin-bottom:14px"><label>ຊື່ລາຍການ</label><input type="text" id="dpName" placeholder="ເຊັ່ນ ລູກຄ້າ VIP"></div>
    <div class="fg full" style="margin-bottom:14px"><label>ແບບ</label>
      <div class="opt-row" id="dpTypeRow">
        <button type="button" class="opt-btn on" data-t="pct" onclick="dpSetType('pct')">% ເປີເຊັນ</button>
        <button type="button" class="opt-btn" data-t="fixed" onclick="dpSetType('fixed')">ກີບ ຈຳນວນເງິນ</button>
      </div><input type="hidden" id="dpType" value="pct">
    </div>
    <div class="fg full"><label>ຈຳນວນ</label><div class="unit-in"><input type="number" id="dpValue" inputmode="numeric" min="0"><span class="u" id="dpUnit">%</span></div></div>
    <button class="btn-save" onclick="saveDiscountPresetItem()">ບັນທຶກ</button>
    <button class="btn-ghost" onclick="closeModal()">ຍົກເລີກ</button>
  </div></div>`;
  $('modalRoot').innerHTML=html;
}
function dpSetType(t){ $('dpType').value=t; document.querySelectorAll('#dpTypeRow .opt-btn').forEach(b=>b.classList.toggle('on',b.dataset.t===t)); const u=$('dpUnit'); if(u)u.textContent=t==='fixed'?'ກີບ':'%'; }
function saveDiscountPresetItem(){
  const name=$('dpName').value.trim();
  const type=$('dpType').value;
  const value=parseFloat($('dpValue').value)||0;
  if(!name){ toast('ໃສ່ຊື່ລາຍການ',true); return; }
  if(value<=0){ toast('ໃສ່ຈຳນວນ',true); return; }
  if(type==='pct'&&value>100){ toast('ເປີເຊັນເກີນ 100 ບໍ່ໄດ້',true); return; }
  state.discountPresets.push({id:'d'+Date.now(),name,type,value});
  save(); closeModal(); refresh(); toast('ເພີ່ມລາຍການສ່ວນຫຼຸດແລ້ວ');
}
function deleteDiscountPreset(id){
  state.discountPresets=state.discountPresets.filter(p=>p.id!==id);
  save(); refresh(); toast('ລຶບແລ້ວ');
}

/* ---- ປ່ຽນລະຫັດເຂົ້າລະບົບ ---- */
function changeLogin(){
  const name=$('setUsername').value.trim();
  const p1=$('setPass1').value;
  const p2=$('setPass2').value;
  if(!name){ toast('ໃສ່ຊື່ຜູ້ໃຊ້',true); return; }
  if(!p1){ toast('ໃສ່ລະຫັດຜ່ານໃໝ່',true); return; }
  if(p1.length<4){ toast('ລະຫັດຕ້ອງຢ່າງໜ້ອຍ 4 ຕົວ',true); return; }
  if(p1!==p2){ toast('ລະຫັດຢືນຢັນບໍ່ຕົງກັນ',true); return; }
  state.user={name,pass:p1};
  DB.set('user',state.user);
  $('setPass1').value=''; $('setPass2').value='';
  toast('ບັນທຶກລະຫັດເຂົ້າລະບົບໃໝ່ແລ້ວ ✓');
}

/* ============================================================
   SYNC PANEL (UI) — ສະຖານະ %, Cloud, Export/Import, ຊ່ອງໂວ່
   ============================================================ */
function renderSyncPanel(){
  const H=SYNC.health();
  const statusMap={local:['⚪','ໂໝດເຄື່ອງດຽວ (local\u00A0only)','#8899aa'],connecting:['🟡','ກຳລັງເຊື່ອມຕໍ່...','#E0A64C'],online:['🟢','ຊິ້ງ Cloud ຣຽວທາມ','#2FA8A0'],error:['🔴','Cloud ຜິດພາດ','#C1554F']};
  const sm=statusMap[SYNC.status]||statusMap.local;
  const barColor=H.pct>=80?'#2FA8A0':H.pct>=50?'#E0A64C':'#C1554F';
  const checkRows=H.checks.map(c=>`<div style="display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px dashed var(--line)">
    <span style="font-size:16px">${c.ok?'✅':(c.critical?'❌':'⚪')}</span>
    <div style="flex:1"><div style="font-size:13px;font-weight:600">${c.name}</div>${c.detail?`<div style="font-size:11px;color:var(--ink-soft);margin-top:1px">${esc(c.detail)}</div>`:''}</div>
  </div>`).join('');
  const hasCfg=!!DB.get('fbConfig',null);
  const storeId=DB.get('storeId','')||'';

  let gapHtml='';
  if(H.gaps.length>0){
    gapHtml=`<div class="card" style="border:2px solid var(--warn);background:#FEF6EC">
      <div class="card-title"><span class="dot" style="background:var(--warn)"></span>⚠️ ພົບຊ່ອງໂວ່ ${H.gaps.length} ຈຸດ</div>
      <div style="max-height:140px;overflow-y:auto;margin-bottom:10px">${H.gaps.map(g=>`<div style="font-size:12px;color:#96552F;padding:4px 0">• ${g.msg}</div>`).join('')}</div>
      <button class="btn-save" style="background:linear-gradient(135deg,#E0A64C,#C1854C);margin-top:0" onclick="doRepairGaps()">🛠️ ແກ້ໄຂອັດຕະໂນມັດທັນທີ</button>
    </div>`;
  } else {
    gapHtml=`<div class="card" style="border:1.5px solid var(--pastel-mint)"><div style="display:flex;align-items:center;gap:10px"><span style="font-size:22px">✅</span><div><div style="font-size:14px;font-weight:700">ຂໍ້ມູນຄົບຖ້ວນ ບໍ່ມີຊ່ອງໂວ່</div><div style="font-size:12px;color:var(--ink-soft)">ລະບົບກວດແລ້ວ ທຸກຢ່າງປົກກະຕິ</div></div></div></div>`;
  }

  return `
    <div class="card">
      <div style="text-align:center;padding:6px 0 14px">
        <div style="font-size:13px;color:var(--ink-soft);font-weight:600">ຄວາມພ້ອມໃຊ້ງານ</div>
        <div style="font-size:40px;font-weight:800;color:${barColor};line-height:1.1;margin:4px 0">${H.pct}%</div>
        <div style="height:12px;background:#EAF6F6;border-radius:8px;overflow:hidden;margin:8px 4px 0"><div style="height:100%;width:${H.pct}%;background:${barColor};border-radius:8px;transition:width .6s"></div></div>
      </div>
      <div style="display:flex;align-items:center;justify-content:center;gap:8px;padding:10px;background:#F4FAFA;border-radius:12px;margin-bottom:6px">
        <span style="font-size:14px">${sm[0]}</span><span style="font-size:13.5px;font-weight:700;color:${sm[2]}">${sm[1]}</span>
      </div>
      ${SYNC.status==='error'?`<div class="tiny-note" style="color:var(--danger-deep);text-align:left">ຂໍ້ຄວາມຜິດພາດ: ${esc(SYNC.lastError)}</div>`:''}
      <div style="margin-top:12px">${checkRows}</div>
    </div>

    ${gapHtml}

    ${(()=>{ const S=storageStats();
      const col=S.pct>=80?'#C1554F':S.pct>=50?'#E0A64C':'#2FA8A0';
      const hasLegacy=S.imgBytes>0||S.orderImgBytes>0;
      return `<div class="card" ${S.pct>=80?'style="border:2px solid var(--danger)"':''}>
        <div class="card-title"><span class="dot" style="background:${col}"></span>💽 ພື້ນທີ່ໃນເຄື່ອງ</div>
        <div style="display:flex;justify-content:space-between;font-size:12.5px;font-weight:600">
          <span>ໃຊ້ ${Math.round(S.used/1024)} KB</span><span style="color:${col}">${S.pct}% ຈາກ ~5 MB</span>
        </div>
        <div class="stor-bar"><div class="stor-fill" style="width:${S.pct}%;background:${col}"></div></div>

        <button class="btn-save" style="margin-top:0;background:linear-gradient(135deg,#E0A64C,#C1854C)" onclick="doStripImages()">🧹 ລ້າງຮູບເກົ່າ ກູ້ພື້ນທີ່</button>`:
        `<div class="tiny-note" style="text-align:left;margin-top:6px">✅ ສະອາດ — ຮູບໃຊ້ລິ້ງທັງໝົດ ບໍ່ກິນເນື້ອທີ່</div>`}
      </div>`; })()}

    <div class="card">
      <div class="card-title"><span class="dot"></span>💾 ສຳຮອງ & ກູ້ຂໍ້ມູນ (ໃຊ້ໄດ້ທຸກເຄື່ອງ)</div>
      <div class="tiny-note" style="text-align:left;margin-top:0;margin-bottom:12px">ດາວໂຫຼດໄຟລ໌ສຳຮອງໄວ້ ຫຼື ສົ່ງໃຫ້ເຄື່ອງອື່ນເປີດ → ຂໍ້ມູນຄືກັນ. ໃຊ້ໄດ້ບໍ່ຕ້ອງອິນເຕີເນັດ.</div>
      <div style="display:flex;gap:10px">
        <button class="btn-save" style="margin-top:0;flex:1" onclick="exportData()"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>ດາວໂຫຼດສຳຮອງ</button>

async function saveCloudConfig(){
  let raw=$('fbCfgInput').value.trim();
  if(!raw){ toast('ວາງ config ກ່ອນ',true); return; }
  let cfg;
  try{
    // ດຶງສະເພາະ object { ... } ອອກມາ (ຕັດ "const firebaseConfig =" ຫຼື ";" ຮອບນອກ)
    const first=raw.indexOf('{'); const last=raw.lastIndexOf('}');
    if(first>=0 && last>first) raw=raw.slice(first,last+1);
    // ຮັບໄດ້ທັງ JSON ແທ້ ຫຼື object ແບບ JS (key ບໍ່ມີ quote)
    try{ cfg=JSON.parse(raw); }
    catch(_){ cfg=(new Function('return ('+raw+')'))(); }
  }catch(e){ toast('config ບໍ່ຖືກຮູບແບບ ລອງໃໝ່',true); return; }
  if(!cfg||!cfg.projectId||!cfg.apiKey){ toast('config ຂາດ projectId ຫຼື apiKey',true); return; }
  const sid=$('fbStoreId').value.trim();
  if(sid) DB.set('storeId',sid); else if(!DB.get('storeId',null)) DB.set('storeId',EMBEDDED_STORE_ID);
  DB.set('fbConfig',cfg);
  closeModal();
  toast('ກຳລັງເຊື່ອມຕໍ່ Cloud...');
  const okc=await SYNC.connectCloud(cfg);
  // ★ ໃສ່ config ລົງ URL (hash) ໃຫ້ລິ້ງນີ້ກາຍເປັນລິ້ງແຊຣ໌ໄດ້ທັນທີ
  try{ const link=SYNC.shareLink(); if(link&&history&&history.replaceState) history.replaceState(null,'','#s='+link.split('#s=')[1]); }catch(e){}
  refresh();
  if(okc){ toast('ເຊື່ອມຕໍ່ Cloud ສຳເລັດ ✓'); setTimeout(()=>showShareLink(),400); }
  else toast('ຕໍ່ Cloud ບໍ່ໄດ້: '+SYNC.lastError, true);
}

function copyShareLink(){
  const link=SYNC.shareLink();
  if(!link){ toast('ຕັ້ງຄ່າ Cloud ກ່ອນ',true); return; }
  const done=()=>toast('ກ໋ອບປີ້ລິ້ງແລ້ວ ✓ ສົ່ງໃຫ້ໝູ່ໄດ້ເລີຍ');
  try{
    if(navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText(link).then(done).catch(()=>fallbackCopy(link,done)); }
    else fallbackCopy(link,done);
  }catch(e){ fallbackCopy(link,done); }
}
function fallbackCopy(text,cb){
  const box=$('shareLinkBox');
  if(box){ box.select(); try{ document.execCommand('copy'); cb&&cb(); return; }catch(e){} }
  // ຖ້າຍັງບໍ່ໄດ້ ໃຫ້ສະແດງ modal ໃຫ້ກ໋ອບເອງ
  if(!box) showShareLink();
  else toast('ກົດຄ້າງທີ່ຊ່ອງລິ້ງ ແລ້ວເລືອກ Copy',true);
}

      <input type="text" id="menuName" value="${esc(e.name)}" placeholder="ເຊັ່ນ ຊາໄທເຢັນ">
      <div class="saved-names">${chips}</div>
      <div class="saved-hint">💡 ແຕະຊື່ທີ່ບັນທຶກໄວ້ ຫຼື ພິມໃໝ່ແລ້ວກົດ "ບັນທຶກຊື່"</div>
      <button class="btn-ghost" style="margin-top:10px" onclick="saveCurrentName()">＋ ບັນທຶກຊື່ນີ້ໄວ້ໃຊ້ຄັ້ງໜ້າ</button>
    </div>

    <div class="fg full" style="margin-bottom:14px"><label>ປະເພດ</label>
      <div style="display:flex;gap:8px"><select id="menuCat" style="flex:1">${catOpts}</select>
      <button class="lu-btn" style="padding:0 16px;white-space:nowrap" onclick="addMenuCat()">＋ ໃໝ່</button></div>
    </div>
    <div class="fg full" style="margin-bottom:14px"><label>ໄອຄອນ (ເມື່ອບໍ່ມີຮູບ) <span id="emojiPreview" style="font-size:22px">${e.emoji}</span></label><div class="emoji-pick" style="max-height:150px;overflow-y:auto">${emojiBtns}</div></div>

    <div class="divider-lbl">🧪 ສູດ (ສ່ວນປະສົມ) — ດຶງຕົ້ນທຶນຈາກສາງ</div>
    <div class="recipe-box">
      <div id="recipeRows">${renderRecipeRows()}</div>
      <button class="add-ing-btn" onclick="addRecipeRow()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>ເພີ່ມສ່ວນປະສົມ</button>
    </div>

    <div class="fg full" style="margin-top:14px;margin-bottom:0"><label>ຄ່າໃຊ້ຈ່າຍແຝງ (Overhead) ສະເພາະເມນູນີ້</label>
      <div class="unit-in"><input type="number" id="menuOverhead" value="${ohVal}" inputmode="numeric" min="0" oninput="recalcMenu()"><span class="u">%</span></div>
      <div class="saved-hint">ຄ່າເລີ່ມຕົ້ນຈາກຮ້ານ = ${state.shop.overheadPct}% (ປັບສະເພາະເມນູນີ້ໄດ້)</div>
    </div>

    <div class="calc-preview" id="menuCostPrev"></div>

    <div class="divider-lbl">💰 ເລືອກ % ກຳໄລ → ລາຄາຂາຍແນະນຳ</div>
    <div class="margin-btns" id="marginBtns">
      ${[10,20,30,50,70].map(p=>`<button class="margin-btn" data-m="${p}" onclick="pickMargin(${p})">${p}%</button>`).join('')}
    </div>
    <div id="suggestBox"></div>

    <div class="fg full" style="margin-top:16px"><label>ລາຄາຂາຍຈິງ (ພິມເອງ ຫຼື ໃຊ້ລາຄາແນະນຳ)</label>
      <div class="unit-in"><input type="number" id="menuPrice" value="${e.price}" inputmode="numeric" oninput="recalcMenu()"><span class="u">ກີບ</span></div>
    </div>

    <button class="btn-save" onclick="saveMenu('${item?item.id:''}')"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>${isEdit?'ບັນທຶກ':'ເພີ່ມເມນູ'}</button>
    ${isEdit?`<button class="btn-ghost" style="color:var(--danger-deep)" onclick="deleteMenu('${item.id}')">🗑️ ລຶບເມນູນີ້</button>`:''}
    <button class="btn-ghost" onclick="closeModal()">ຍົກເລີກ</button>
  </div></div>`;
  $('modalRoot').innerHTML=html;
  recalcMenu();
}

function menuImgZoneHtml(){
  const cur=(menuDraft&&menuDraft.img)?menuDraft.img:'';
  const legacy=isDataImage(cur);
  const preview=cur?`<div class="img-preview"><img src="${cur}" alt="" onerror="this.parentElement.innerHTML='<div class=\\'img-err\\'>⚠️ ເປີດຮູບບໍ່ໄດ້ — ກວດວ່າຕັ້ງແຊຣ໌ເປັນ Anyone with the link ແລ້ວບໍ່</div>'"><button class="ip-remove" onclick="clearMenuImg()">✕</button></div>`:'';
  return `${preview}
    ${legacy?`<div class="legacy-warn">⚠️ ຮູບນີ້ເປັນຮູບເກົ່າ (ເກັບໃນເຄື່ອງ) ກິນເນື້ອທີ່ ~${Math.round(byteSize(cur)/1024)}KB · ແນະນຳໃຫ້ປ່ຽນເປັນລິ້ງ</div>`:''}
    <input type="text" id="menuImgUrl" value="${legacy?'':esc(cur)}" placeholder="ວາງລິ້ງຮູບ Google Drive ທີ່ນີ້" oninput="onMenuImgUrl(this.value)">
    <div class="saved-hint">📎 ວາງລິ້ງແຊຣ໌ຈາກ Google Drive ໄດ້ເລີຍ ລະບົບແປງໃຫ້ອັດຕະໂນມັດ · <a onclick="showDriveGuide()" style="color:var(--teal-deep);font-weight:700;cursor:pointer">ວິທີເອົາລິ້ງ</a></div>`;
}
function onMenuImgUrl(v){
  menuDraft.img=normalizeImageUrl(v);
  clearTimeout(window._imgT);
  window._imgT=setTimeout(()=>{ const z=$('menuImgZone'); if(z){ z.innerHTML=menuImgZoneHtml(); const el=$('menuImgUrl'); if(el){ el.focus(); } } },900);
}
function clearMenuImg(){ menuDraft.img=null; const z=$('menuImgZone'); if(z)z.innerHTML=menuImgZoneHtml(); }
function showDriveGuide(){
  const html=`<div class="modal-back" style="z-index:260" onclick="if(event.target===this)closeDriveGuide()"><div class="modal">
    <div class="modal-grip"></div><h3>📎 ວິທີເອົາລິ້ງຮູບຈາກ Google Drive</h3>
    <p class="msub">ເຮັດຄັ້ງດຽວຕໍ່ຮູບ · ຟຣີ ບໍ່ກິນເນື້ອທີ່ໃນເຄື່ອງ</p>
    <div style="font-size:13.5px;line-height:1.95;color:var(--ink)">
      <div style="margin-bottom:9px"><b>1.</b> ເປີດແອັບ <b>Google Drive</b> → ອັບຮູບເມນູຂຶ້ນ</div>
      <div style="margin-bottom:9px"><b>2.</b> ກົດຄ້າງທີ່ຮູບ → <b>ແຊຣ໌ (Share)</b></div>
      <div style="margin-bottom:9px"><b>3.</b> ປ່ຽນສິດເປັນ <b>“Anyone with the link”</b> ⬅️ <span style="color:var(--danger-deep);font-weight:700">ສຳຄັນທີ່ສຸດ!</span> ຖ້າບໍ່ຕັ້ງ ຮູບຈະບໍ່ຂຶ້ນ</div>
      <div style="margin-bottom:9px"><b>4.</b> ກົດ <b>Copy link</b></div>
      <div style="margin-bottom:9px"><b>5.</b> ກັບມາວາງໃນຊ່ອງລິ້ງຮູບ → ລະບົບແປງໃຫ້ເອງ</div>
      <div style="background:#F2FBFA;border-radius:10px;padding:12px;margin-top:10px;font-size:12.5px;color:var(--teal-deep)"><b>ເຄັດລັບ:</b> ສ້າງໂຟນເດີ້ດຽວ ຕັ້ງແຊຣ໌ “Anyone with the link” ທັງໂຟນເດີ້ → ຮູບທຸກອັນທີ່ໃສ່ໃນນັ້ນຈະໃຊ້ໄດ້ໝົດ ບໍ່ຕ້ອງຕັ້ງເທື່ອລະຮູບ</div>
    </div>
    <button class="btn-save" onclick="closeDriveGuide()">ເຂົ້າໃຈແລ້ວ</button>
  </div></div>`;
  const w=document.createElement('div'); w.id='driveGuideRoot'; w.innerHTML=html; document.body.appendChild(w);
}
function closeDriveGuide(){ const w=$('driveGuideRoot'); if(w)w.remove(); }

/* recipe rows */
function renderRecipeRows(){
  if(!menuDraft.recipe.length) return `<div class="recipe-empty">ຍັງບໍ່ມີສ່ວນປະສົມ — ກົດ "ເພີ່ມສ່ວນປະສົມ" ຂ້າງລຸ່ມ</div>`;
  return menuDraft.recipe.map((r,idx)=>{
    const opts=state.ingredients.map(ing=>`<option value="${ing.id}" ${r.ingredientId===ing.id?'selected':''}>${ing.emoji} ${esc(ing.name)}</option>`).join('');
    const ing=findIng(r.ingredientId);
    const bu=ing?ing.baseUnit:'';
    const lineCost=ing?(r.amount||0)*costPerBase(ing):0;
    return `<div class="recipe-row">
      <select onchange="setRecipeIng(${idx},this.value)">${opts}</select>
      <div class="amt-wrap"><input type="number" value="${r.amount||0}" min="0" inputmode="numeric" oninput="setRecipeAmt(${idx},this.value)"><span class="amt-u">${esc(bu)}</span></div>
      <button class="rm-ing" onclick="removeRecipeRow(${idx})">✕</button>
      <div class="ing-cost">= ${fmt(lineCost)} ກີບ</div>
    </div>`;
  }).join('');
}
function addRecipeRow(){
  if(state.ingredients.length===0){ toast('ໄປເພີ່ມວັດຖຸດິບໃນສາງກ່ອນ',true); return; }
  menuDraft.recipe.push({ingredientId:state.ingredients[0].id, amount:0});
  const z=$('recipeRows'); if(z)z.innerHTML=renderRecipeRows();
  recalcMenu();
}
function removeRecipeRow(idx){ menuDraft.recipe.splice(idx,1); const z=$('recipeRows'); if(z)z.innerHTML=renderRecipeRows(); recalcMenu(); }
function setRecipeIng(idx,val){ menuDraft.recipe[idx].ingredientId=val; const z=$('recipeRows'); if(z)z.innerHTML=renderRecipeRows(); recalcMenu(); }
function setRecipeAmt(idx,val){ menuDraft.recipe[idx].amount=parseFloat(val)||0; recalcMenu(); updateRecipeLineCosts(); }
function updateRecipeLineCosts(){
  // update line cost labels without full re-render (keeps focus in the input)
  const rows=document.querySelectorAll('#recipeRows .recipe-row');
  rows.forEach((row,idx)=>{
    const r=menuDraft.recipe[idx]; if(!r)return;
    const ing=findIng(r.ingredientId);
    const lineCost=ing?(r.amount||0)*costPerBase(ing):0;
    const lbl=row.querySelector('.ing-cost'); if(lbl)lbl.textContent='= '+fmt(lineCost)+' ກີບ';
  });
}

/* live recalc of material+overhead+total and suggested prices */
function tempMenuItem(){
  const oh=parseFloat($('menuOverhead')?$('menuOverhead').value:state.shop.overheadPct);
  return {recipe:menuDraft.recipe, overridePct:isNaN(oh)?state.shop.overheadPct:oh};
}
function recalcMenu(){
  const tmp=tempMenuItem();
  const mat=materialCost(tmp);
  const ohPct=overheadPctOf(tmp);
  const oh=mat*ohPct/100;
  const tc=mat+oh;
  const p=$('menuCostPrev');
  if(p)p.innerHTML=`
    <div class="cp-row"><span class="cp-l">ຕົ້ນທຶນວັດຖຸດິບ (ຈາກສູດ)</span><span class="cp-v">${kip(mat)}</span></div>
    <div class="cp-row"><span class="cp-l">ຄ່າໃຊ້ຈ່າຍແຝງ (${ohPct}%)</span><span class="cp-v">${kip(oh)}</span></div>
    <div class="cp-row big"><span class="cp-l">ຕົ້ນທຶນລວມ/ຈອກ</span><span class="cp-v pos-margin">${kip(tc)}</span></div>`;
  // suggested price for selected margin
  const sb=$('suggestBox');
  if(sb){
    if(menuDraft.margin!=null){
      const sp=tc*(1+menuDraft.margin/100);
      sb.innerHTML=`<div class="suggested-price"><span class="sp-l">ລາຄາຂາຍແນະນຳ (ກຳໄລ ${menuDraft.margin}%)</span><span class="sp-v">${kip(sp)}</span></div>
      <button class="use-price-btn" onclick="usePrice(${Math.round(sp)})">ໃຊ້ລາຄານີ້ (${fmt(sp)} ກີບ)</button>`;
    } else {
      sb.innerHTML='';
    }
  }
  // current profit from actual price
  const price=parseFloat($('menuPrice')?$('menuPrice').value:0)||0;
  if(price>0 && p){
    const margin=price-tc;
    const mPct=Math.round(margin/price*100);
    p.innerHTML+=`<div class="cp-row sub"><span class="cp-l">ລາຄາຂາຍປັດຈຸບັນ</span><span class="cp-v">${kip(price)}</span></div>
    <div class="cp-row"><span class="cp-l">ກຳໄລຕໍ່ຈອກ</span><span class="cp-v ${margin>=0?'pos-margin':''}" ${margin<0?'style="color:var(--danger-deep)"':''}>${kip(margin)} (${mPct}%)</span></div>`;
  }
}
function pickMargin(p){
  menuDraft.margin=p;
  document.querySelectorAll('#marginBtns .margin-btn').forEach(b=>b.classList.toggle('on',parseInt(b.dataset.m)===p));
  recalcMenu();
}
function usePrice(v){ const el=$('menuPrice'); if(el){ el.value=v; } recalcMenu(); toast('ໃສ່ລາຄາ '+fmt(v)+' ກີບແລ້ວ'); }

/* saved names */
function applySavedName(idx){
  const sn=state.savedNames[idx]; if(!sn)return;
  $('menuName').value=sn.name; $('menuEmoji').value=sn.emoji;
  document.querySelectorAll('.emoji-pick .emoji-opt').forEach(b=>b.classList.toggle('on',b.textContent===sn.emoji));
  const pv=$('emojiPreview'); if(pv)pv.textContent=sn.emoji;
  toast('ເລືອກ "'+sn.name+'"');
}
function saveCurrentName(){
  const name=$('menuName').value.trim();
  if(!name){ toast('ພິມຊື່ກ່ອນຈຶ່ງບັນທຶກ',true); return; }
  const emoji=$('menuEmoji').value;
  if(state.savedNames.some(sn=>sn.name===name)){ toast('ຊື່ນີ້ບັນທຶກໄວ້ແລ້ວ'); return; }
  state.savedNames.push({name,emoji}); DB.set('savedNames',state.savedNames);
  const zone=document.querySelector('.saved-names');
  if(zone){ const idx=state.savedNames.length-1; zone.insertAdjacentHTML('beforeend',`<button class="saved-name-chip" onclick="applySavedName(${idx})"><span class="snc-em">${emoji}</span>${esc(name)}</button>`); }
  toast('ບັນທຶກຊື່ "'+name+'" ແລ້ວ');
}

/* override emoji preview when picking */
function pickEmoji(btn,hiddenId,em){
  btn.parentElement.querySelectorAll('.emoji-opt').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on'); $(hiddenId).value=em;
  if(hiddenId==='menuEmoji'){ const pv=$('emojiPreview'); if(pv)pv.textContent=em; }
}

function saveMenu(id){
  const name=$('menuName').value.trim();
  if(!name){ toast('ກະລຸນາປ້ອນຊື່ເມນູ',true); return; }
  const price=parseFloat($('menuPrice').value)||0;
  if(price<=0){ toast('ກະລຸນາປ້ອນລາຄາຂາຍ',true); return; }
  // clean recipe: drop rows with amount 0 or missing ingredient
  const recipe=menuDraft.recipe.filter(r=>r.ingredientId && (r.amount||0)>0).map(r=>({ingredientId:r.ingredientId,amount:r.amount}));
  const oh=parseFloat($('menuOverhead').value);
  const overridePct = (isNaN(oh)||oh===state.shop.overheadPct)?null:oh;
  const data={name,emoji:$('menuEmoji').value,img:menuDraft.img||null,category:$('menuCat').value,price,recipe,overridePct};
  if(id){ Object.assign(state.menu.find(m=>m.id===id),data); toast('ບັນທຶກເມນູແລ້ວ'); }
  else{ state.menu.push({id:'m'+Date.now(),...data}); toast('ເພີ່ມເມນູໃໝ່ແລ້ວ'); }
  if(!state.savedNames.some(sn=>sn.name===name)) state.savedNames.push({name,emoji:data.emoji});
  save(); menuDraft=null; closeModal(); refresh();
}
function deleteMenu(id){
  const item=state.menu.find(m=>m.id===id);
  const html=`<div class="modal-back" onclick="if(event.target===this)closeModal()"><div class="modal">
    <div class="modal-grip"></div><h3>ລຶບເມນູ?</h3>
    <p class="msub">ຕ້ອງການລຶບ "${item.emoji} ${esc(item.name)}" ແທ້ບໍ່? ຂໍ້ມູນອໍເດີ້ເກົ່າຈະຍັງຢູ່</p>
    <button class="btn-save" style="background:linear-gradient(135deg,#E57373,#C1554F)" onclick="confirmDeleteMenu('${id}')">ລຶບ</button>
    <button class="btn-ghost" onclick="closeModal()">ຍົກເລີກ</button>
  </div></div>`;
  $('modalRoot').innerHTML=html;
}
function confirmDeleteMenu(id){ state.menu=state.menu.filter(m=>m.id!==id); save(); closeModal(); refresh(); toast('ລຶບເມນູແລ້ວ'); }

window.addEventListener('DOMContentLoaded',()=>{ if(!$('app').classList.contains('hidden'))updateTopbar(); });
</script>
</body>
</html>
